<svg xmlns="http://www.w3.org/2000/svg" width="820" height="400" viewBox="0 0 820 400" font-family="ui-sans-serif, system-ui, sans-serif">
  <defs>
    <marker id="a2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="820" height="400" rx="16" fill="#f8fafc"/>
  <text x="410" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">Pivoting · llegar a lo que no es accesible</text>

  <!-- Attacker -->
  <rect x="40" y="150" width="150" height="80" rx="10" fill="#1e293b"/>
  <text x="115" y="182" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Atacante</text>
  <text x="115" y="202" text-anchor="middle" font-size="12" fill="#cbd5e1">10.10.14.7</text>
  <text x="115" y="219" text-anchor="middle" font-size="11" fill="#94a3b8">(tu Kali)</text>

  <!-- Pivot (dual homed) -->
  <rect x="320" y="140" width="170" height="100" rx="10" fill="#2563eb"/>
  <text x="405" y="170" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">Pívot (comprometido)</text>
  <text x="405" y="192" text-anchor="middle" font-size="12" fill="#dbeafe">eth0: 10.10.10.5</text>
  <text x="405" y="210" text-anchor="middle" font-size="12" fill="#dbeafe">eth1: 172.16.0.1</text>
  <text x="405" y="228" text-anchor="middle" font-size="11" fill="#bfdbfe">2 interfaces = puente</text>

  <!-- Internal network box -->
  <rect x="560" y="80" width="230" height="240" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="675" y="104" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">Red interna 172.16.0.0/24</text>
  <text x="675" y="122" text-anchor="middle" font-size="11" fill="#6366f1">(inalcanzable directamente)</text>

  <rect x="590" y="140" width="170" height="46" rx="8" fill="#ffffff" stroke="#6366f1"/>
  <text x="675" y="168" text-anchor="middle" font-size="12" fill="#3730a3">DB  172.16.0.10</text>
  <rect x="590" y="196" width="170" height="46" rx="8" fill="#ffffff" stroke="#6366f1"/>
  <text x="675" y="224" text-anchor="middle" font-size="12" fill="#3730a3">DC  172.16.0.20</text>
  <rect x="590" y="252" width="170" height="46" rx="8" fill="#ffffff" stroke="#6366f1"/>
  <text x="675" y="280" text-anchor="middle" font-size="12" fill="#3730a3">Web 172.16.0.30</text>

  <!-- links -->
  <line x1="190" y1="190" x2="320" y2="190" stroke="#334155" stroke-width="2.5"/>
  <text x="255" y="180" text-anchor="middle" font-size="11" fill="#475569">accesible</text>
  <line x1="490" y1="190" x2="588" y2="190" stroke="#334155" stroke-width="2.5"/>

  <!-- tunnel -->
  <path d="M115 150 C 115 60, 405 60, 405 138" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#a2)"/>
  <rect x="185" y="40" width="250" height="26" rx="8" fill="#ede9fe"/>
  <text x="310" y="58" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">Túnel (chisel / ssh -D / ligolo)</text>

  <text x="410" y="360" text-anchor="middle" font-size="13" fill="#334155">El atacante enruta su tráfico <tspan font-weight="700">a través</tspan> del pívot para alcanzar 172.16.0.0/24</text>
  <text x="410" y="382" text-anchor="middle" font-size="12" fill="#64748b">proxychains nmap -sT 172.16.0.10  ·  el tráfico entra por el túnel y sale por eth1 del pívot</text>
</svg>
